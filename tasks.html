<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tasks — Productivity Tracker</title>
<link rel="stylesheet" href="/app.css" />
<style>
  .kanban { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; align-items: start; }
  .kanban-col { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .kanban-col-header {
    padding: 12px 14px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; user-select: none;
  }
  .kanban-col-title { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; color: var(--text); }
  .col-count { font-size: 11px; font-weight: 500; background: var(--surface-2); border: 1px solid var(--border); color: var(--text-3); padding: 1px 7px; border-radius: 20px; }
  .col-chevron { width: 14px; height: 14px; stroke: var(--text-3); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; transition: transform 0.2s; }
  .col-collapsed .col-chevron { transform: rotate(-90deg); }
  .kanban-col-body { padding: 10px; display: flex; flex-direction: column; gap: 8px; min-height: 40px; }
  .kanban-col-body.hidden { display: none; }

  .task-card {
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 10px 12px;
    cursor: grab; transition: border-color 0.1s, box-shadow 0.1s;
  }
  .task-card:hover { border-color: var(--border-2); }
  .task-card.dragging { opacity: 0.4; }
  .task-card.drag-over { box-shadow: 0 0 0 2px var(--accent); }

  .task-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
  .task-name { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.4; }
  .task-name.done { text-decoration: line-through; color: var(--text-3); }
  .task-branch-pill { font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
  .task-desc { font-size: 12px; color: var(--text-3); line-height: 1.5; margin-bottom: 8px; }
  .task-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .task-due { font-size: 11px; color: var(--text-3); display: flex; align-items: center; gap: 4px; }
  .task-due svg { width: 11px; height: 11px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .task-due.overdue { color: var(--danger); }
  .task-actions { margin-left: auto; display: flex; gap: 4px; }
  .task-action-btn { background: none; border: none; cursor: pointer; color: var(--text-3); padding: 2px 4px; border-radius: 3px; font-size: 11px; }
  .task-action-btn:hover { color: var(--text); background: var(--surface-3); }

  .drop-zone { min-height: 40px; border-radius: var(--radius); border: 2px dashed transparent; transition: border-color 0.15s, background 0.15s; }
  .drop-zone.drag-active { border-color: var(--accent); background: var(--accent-dim); }

  .toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="topbar">
      <div>
        <div class="topbar-title">Tasks</div>
        <div class="topbar-sub">Kanban board</div>
      </div>
      <div class="topbar-actions">
        <button class="btn-primary" onclick="openModal('modal-task')">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New task
        </button>
      </div>
    </div>

    <div class="content">
      <div class="toolbar">
        <select class="form-select" id="branch-filter" style="width:180px;" onchange="renderBoard()">
          <option value="">All branches</option>
        </select>
      </div>

      <div class="kanban" id="kanban-board">
        <!-- rendered by JS -->
      </div>
    </div>
  </main>
</div>

<!-- TASK MODAL -->
<div class="modal-backdrop" id="modal-task" style="display:none;">
  <div class="modal">
    <div class="modal-title" id="modal-task-title">New task</div>
    <input type="hidden" id="task-id" />
    <div class="form-field">
      <label class="form-label">Title *</label>
      <input class="form-input" id="task-title" placeholder="Task name…" />
    </div>
    <div class="form-field">
      <label class="form-label">Description</label>
      <textarea class="form-input" id="task-desc" rows="3" placeholder="What needs to be done…" style="resize:vertical;"></textarea>
    </div>
    <div class="form-field">
      <label class="form-label">Branch</label>
      <select class="form-select" id="task-branch" onchange="onBranchChange()">
        <option value="">— No branch —</option>
      </select>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div class="form-field">
        <label class="form-label">Due date (optional)</label>
        <input class="form-input" type="date" id="task-due-date" />
      </div>
      <div class="form-field">
        <label class="form-label">Due time (optional)</label>
        <input class="form-input" type="time" id="task-due-time" />
      </div>
    </div>
    <div class="form-field">
      <label class="form-label">Hourly rate (R/hr) — inherited from branch, editable</label>
      <input class="form-input" type="number" id="task-rate" step="0.01" placeholder="133.33" />
    </div>
    <div class="form-field">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
        <input type="checkbox" id="task-billable" checked />
        <span class="form-label" style="margin:0;">Billable</span>
      </label>
    </div>
    <div class="modal-footer">
      <button class="btn-danger" id="task-delete-btn" style="display:none;margin-right:auto;" onclick="deleteTask()">Delete</button>
      <button class="btn-ghost" onclick="closeModal('modal-task')">Cancel</button>
      <button class="btn-primary" onclick="saveTask()">Save</button>
    </div>
  </div>
</div>

<!-- BRANCH MODAL -->
<div class="modal-backdrop" id="modal-branch" style="display:none;">
  <div class="modal">
    <div class="modal-title">New branch</div>
    <div class="form-field">
      <label class="form-label">Branch name *</label>
      <input class="form-input" id="branch-name" placeholder="e.g. Aloware" />
    </div>
    <div class="form-field">
      <label class="form-label">Colour</label>
      <div class="colour-picker" id="colour-picker"></div>
      <input type="hidden" id="branch-colour" value="#58a6ff" />
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal('modal-branch')">Cancel</button>
      <button class="btn-primary" onclick="saveBranch()">Create</button>
    </div>
  </div>
</div>

<script src="/app.js"></script>
<script src="/sidebar.js"></script>
<script>
let tasks = [];
let branches = [];
let me = null;
let draggedId = null;

async function init() {
  me = await requireLogin();
  if (!me) return;
  branches = await GET('branches').catch(() => []);
  buildSidebar('tasks', me, branches);
  tasks = await GET('tasks').catch(() => []);
  populateBranchFilter();
  populateBranchSelect();
  buildColourPicker();
  renderBoard();
}

function populateBranchFilter() {
  const sel = document.getElementById('branch-filter');
  branches.forEach(b => {
    const o = document.createElement('option');
    o.value = b.id; o.textContent = b.name; sel.appendChild(o);
  });
}

function populateBranchSelect() {
  const sel = document.getElementById('task-branch');
  sel.innerHTML = '<option value="">— No branch —</option>';
  branches.forEach(b => {
    const o = document.createElement('option');
    o.value = b.id; o.textContent = b.name; sel.appendChild(o);
  });
}

function buildColourPicker() {
  const picker = document.getElementById('colour-picker');
  picker.innerHTML = '';
  PALETTE.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'colour-swatch' + (c === '#58a6ff' ? ' active' : '');
    sw.style.background = c;
    sw.onclick = () => {
      document.querySelectorAll('.colour-swatch').forEach(s => s.classList.remove('active'));
      sw.classList.add('active');
      document.getElementById('branch-colour').value = c;
    };
    picker.appendChild(sw);
  });
}

function renderBoard() {
  const filterBranch = document.getElementById('branch-filter').value;
  const filtered = filterBranch ? tasks.filter(t => t.branch_id === filterBranch) : tasks;

  const cols = [
    { status: 'todo',        label: 'To do',       colour: 'var(--text-3)' },
    { status: 'in_progress', label: 'In progress',  colour: 'var(--warning)' },
    { status: 'completed',   label: 'Completed',    colour: 'var(--success)' }
  ];

  const board = document.getElementById('kanban-board');
  board.innerHTML = '';

  for (const col of cols) {
    const colTasks = filtered.filter(t => t.status === col.status);
    const div = document.createElement('div');
    div.className = 'kanban-col';
    div.dataset.status = col.status;

    div.innerHTML = `
      <div class="kanban-col-header" onclick="toggleCol(this)">
        <div class="kanban-col-title">
          <span style="width:8px;height:8px;border-radius:50%;background:${col.colour};display:inline-block;flex-shrink:0;"></span>
          ${col.label}
          <span class="col-count">${colTasks.length}</span>
        </div>
        <svg class="col-chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="kanban-col-body drop-zone" id="col-${col.status}"
        ondragover="onDragOver(event)" ondrop="onDrop(event,'${col.status}')" ondragleave="onDragLeave(event)">
        ${colTasks.map(t => taskCardHTML(t)).join('')}
      </div>
    `;
    board.appendChild(div);
  }
}

function taskCardHTML(t) {
  const b = t.branches;
  const colour = b?.colour || '#6e7681';
  const bg = colourBg(colour, 0.15);
  const due = t.due_at ? new Date(t.due_at) : null;
  const overdue = due && due < new Date() && t.status !== 'completed';
  const dueStr = due ? due.toLocaleDateString('en-ZA', { day:'numeric', month:'short' }) : '';

  return `
    <div class="task-card" draggable="true" data-id="${t.id}"
      ondragstart="onDragStart(event,'${t.id}')"
      ondragend="onDragEnd(event)">
      <div class="task-card-top">
        <div class="task-name ${t.status === 'completed' ? 'done' : ''}">${escHtml(t.title)}</div>
        ${b ? `<span class="task-branch-pill" style="background:${bg};color:${colour};">${escHtml(b.name)}</span>` : ''}
      </div>
      ${t.description ? `<div class="task-desc">${escHtml(t.description)}</div>` : ''}
      <div class="task-meta">
        ${due ? `<span class="task-due ${overdue ? 'overdue' : ''}">
          <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          ${dueStr}${overdue ? ' · Overdue' : ''}
        </span>` : ''}
        <span class="badge ${t.billable ? 'badge-billable' : 'badge-nonbillable'}">${t.billable ? 'Billable' : 'Non-billable'}</span>
        <div class="task-actions">
          <button class="task-action-btn" onclick="editTask('${t.id}')">Edit</button>
        </div>
      </div>
    </div>
  `;
}

function toggleCol(header) {
  const col = header.closest('.kanban-col');
  const body = col.querySelector('.kanban-col-body');
  col.classList.toggle('col-collapsed');
  body.classList.toggle('hidden');
}

// ── DRAG & DROP ───────────────────────────────────────────────
function onDragStart(e, id) {
  draggedId = id;
  setTimeout(() => e.target.classList.add('dragging'), 0);
}

function onDragEnd(e) {
  e.target.classList.remove('dragging');
}

function onDragOver(e) {
  e.preventDefault();
  e.currentTarget.classList.add('drag-active');
}

function onDragLeave(e) {
  e.currentTarget.classList.remove('drag-active');
}

async function onDrop(e, status) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-active');
  if (!draggedId) return;

  const task = tasks.find(t => t.id === draggedId);
  if (!task || task.status === status) return;

  try {
    const updated = await PATCH('tasks', { id: draggedId, status });
    tasks = tasks.map(t => t.id === draggedId ? updated : t);
    renderBoard();
    toast('Task moved', 'success');
  } catch(e) { toast(e.message, 'error'); }
  draggedId = null;
}

// ── TASK MODAL ────────────────────────────────────────────────
function onBranchChange() {
  const branchId = document.getElementById('task-branch').value;
  const branch = branches.find(b => b.id === branchId);
  document.getElementById('task-rate').value = branch ? branch.hourly_rate : '';
}

function openNewTask() {
  document.getElementById('modal-task-title').textContent = 'New task';
  document.getElementById('task-id').value = '';
  document.getElementById('task-title').value = '';
  document.getElementById('task-desc').value = '';
  document.getElementById('task-branch').value = '';
  document.getElementById('task-due-date').value = '';
  document.getElementById('task-due-time').value = '';
  document.getElementById('task-billable').checked = true;
  document.getElementById('task-rate').value = '';
  document.getElementById('task-delete-btn').style.display = 'none';
  openModal('modal-task');
}

function editTask(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  document.getElementById('modal-task-title').textContent = 'Edit task';
  document.getElementById('task-id').value = t.id;
  document.getElementById('task-title').value = t.title;
  document.getElementById('task-desc').value = t.description || '';
  document.getElementById('task-branch').value = t.branch_id || '';
  document.getElementById('task-billable').checked = t.billable;
  document.getElementById('task-rate').value = t.hourly_rate != null ? t.hourly_rate : (t.branches?.hourly_rate ?? '');
  document.getElementById('task-delete-btn').style.display = 'inline-flex';
  if (t.due_at) {
    const d = new Date(t.due_at);
    document.getElementById('task-due-date').value = d.toISOString().slice(0,10);
    document.getElementById('task-due-time').value = d.toTimeString().slice(0,5);
  } else {
    document.getElementById('task-due-date').value = '';
    document.getElementById('task-due-time').value = '';
  }
  openModal('modal-task');
}

async function saveTask() {
  const id       = document.getElementById('task-id').value;
  const title    = document.getElementById('task-title').value.trim();
  const desc     = document.getElementById('task-desc').value.trim();
  const branch   = document.getElementById('task-branch').value;
  const billable = document.getElementById('task-billable').checked;
  const dueDate  = document.getElementById('task-due-date').value;
  const dueTime  = document.getElementById('task-due-time').value;
  const rateVal  = document.getElementById('task-rate').value;
  const hourly_rate = rateVal !== '' ? parseFloat(rateVal) : null;

  if (!title) { toast('Title is required', 'error'); return; }

  let due_at = null;
  if (dueDate) due_at = dueDate + (dueTime ? 'T' + dueTime : 'T00:00') + ':00';

  try {
    if (id) {
      const updated = await PATCH('tasks', { id, title, description: desc, branch_id: branch || null, billable, due_at, hourly_rate });
      tasks = tasks.map(t => t.id === id ? updated : t);
    } else {
      const created = await POST('tasks', { title, description: desc, branch_id: branch || null, billable, due_at, hourly_rate });
      tasks.push(created);
    }
    closeModal('modal-task');
    renderBoard();
    toast(id ? 'Task updated' : 'Task created', 'success');
  } catch(e) { toast(e.message, 'error'); }
}

async function deleteTask() {
  const id = document.getElementById('task-id').value;
  if (!id || !confirm('Delete this task? This will also remove its time logs.')) return;
  try {
    await DELETE('tasks', { id });
    tasks = tasks.filter(t => t.id !== id);
    closeModal('modal-task');
    renderBoard();
    toast('Task deleted', 'success');
  } catch(e) { toast(e.message, 'error'); }
}

// ── BRANCH MODAL ──────────────────────────────────────────────
async function saveBranch() {
  const name   = document.getElementById('branch-name').value.trim();
  const colour = document.getElementById('branch-colour').value;
  if (!name) { toast('Branch name required', 'error'); return; }
  try {
    const b = await POST('branches', { name, colour });
    branches.push(b);
    populateBranchFilter();
    populateBranchSelect();
    buildSidebar('tasks', me, branches);
    closeModal('modal-branch');
    toast('Branch created', 'success');
  } catch(e) { toast(e.message, 'error'); }
}

// Override the new task button to use our function
document.querySelector('.btn-primary[onclick="openModal(\'modal-task\')"]')
  ?.setAttribute('onclick', 'openNewTask()');

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

init();
</script>
</body>
</html>
