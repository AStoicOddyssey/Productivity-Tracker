<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Productivity Tracker — Sign in</title>
<link rel="stylesheet" href="/app.css" />
<style>
  body {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; gap: 24px;
  }

  .wordmark {
    display: flex; align-items: center; gap: 10px;
  }

  .wordmark-icon {
    width: 32px; height: 32px;
    background: var(--accent); border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }

  .wordmark-icon svg { width: 18px; height: 18px; stroke: #0d1117; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .wordmark-text { font-size: 16px; font-weight: 600; color: var(--text); }

  .login-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 28px; width: 340px;
  }

  .login-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .login-sub   { font-size: 13px; color: var(--text-2); margin-bottom: 24px; }

  .error-msg {
    background: rgba(248,81,73,0.1); border: 1px solid rgba(248,81,73,0.3);
    border-radius: var(--radius); padding: 8px 12px;
    font-size: 13px; color: var(--danger); margin-bottom: 14px; display: none;
  }

  .btn-login {
    width: 100%; margin-top: 8px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }

  .forgot { float: right; font-size: 12px; color: var(--accent); text-decoration: none; }
  .footer-note { font-size: 12px; color: var(--text-3); }
  .footer-note a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>

<div class="wordmark">
  <div class="wordmark-icon">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="14" x2="16" y2="14"/><line x1="8" y1="18" x2="16" y2="18"/></svg>
  </div>
  <span class="wordmark-text">Productivity Tracker</span>
</div>

<div class="login-card">
  <p class="login-title">Sign in</p>
  <p class="login-sub">Enter your credentials to continue</p>

  <div class="error-msg" id="error-msg"></div>

  <div class="form-field">
    <label class="form-label" for="email">
      Email
      <a href="mailto:admin@gsa.com" class="forgot">Need access?</a>
    </label>
    <input class="form-input" type="email" id="email" placeholder="you@example.com" autocomplete="email" />
  </div>

  <div class="form-field">
    <label class="form-label" for="password">Password</label>
    <input class="form-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
  </div>

  <button class="btn-primary btn-login" id="login-btn" onclick="login()">
    Sign in
  </button>
</div>

<p class="footer-note">Access is restricted. <a href="mailto:admin@gsa.com">Request access</a></p>

<script>
  const OWNER_EMAIL = 'nepelser@gmail.com';
  const landingFor = (email) =>
    (email || '').trim().toLowerCase() === OWNER_EMAIL ? '/dashboard' : '/uni';

  // Redirect if already logged in
  fetch('/api/auth?action=me', { credentials: 'same-origin' })
    .then(r => r.ok ? r.json() : null)
    .then(me => { if (me) window.location.href = landingFor(me.email); })
    .catch(() => {});

  async function login() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('login-btn');
    const errEl    = document.getElementById('error-msg');

    if (!email || !password) {
      showError('Please enter your email and password.');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<div class="spinner" style="width:16px;height:16px;border-width:2px;"></div> Signing in…';
    errEl.style.display = 'none';

    try {
      const res = await fetch('/api/auth?action=login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Login failed');

      window.location.href = landingFor(email);
    } catch (err) {
      showError(err.message);
      btn.disabled = false;
      btn.textContent = 'Sign in';
    }
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });
</script>
</body>
</html>
