<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>University Calendar — Productivity Tracker</title>
<link rel="stylesheet" href="/app.css" />
<style>
  .uni-layout { display: grid; grid-template-columns: 1fr 340px; gap: 16px; align-items: start; }
  .cal-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .cal-nav-bar { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid var(--border); }
  .cal-nav-title { font-size: 15px; font-weight: 600; color: var(--text); }
  .cal-nav-btns { display: flex; align-items: center; gap: 8px; }
  .cal-nav-btn { background: none; border: 1px solid var(--border); border-radius: var(--radius); color: var(--text-2); width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .cal-nav-btn:hover { border-color: var(--border-2); color: var(--text); }
  .cal-nav-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
  .cal-dow { padding: 8px 4px; text-align: center; font-size: 11px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); }
  .cal-day { min-height: 90px; padding: 6px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
  .cal-day:hover { background: var(--surface-2); }
  .cal-day.other-month { opacity: 0.35; }
  .cal-day.today .day-num { background: var(--accent); color: #0d1117; border-radius: 50%; }
  .cal-day:nth-child(7n) { border-right: none; }
  .day-num { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: var(--text-2); margin-bottom: 4px; }
  .task-pill { display: flex; align-items: flex-start; gap: 4px; border-radius: 4px; padding: 3px 6px; margin-bottom: 2px; font-size: 10px; font-weight: 500; cursor: pointer; white-space: normal; overflow-wrap: anywhere; line-height: 1.3; }
  .task-pill .status-icon { margin-top: 1px; flex-shrink: 0; }
  .task-pill:hover { filter: brightness(1.2); }
  .right-panel { display: flex; flex-direction: column; gap: 12px; }
  .stack-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .stack-header { padding: 12px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .stack-title { font-size: 13px; font-weight: 600; color: var(--text); }
  .stack-body { max-height: 280px; overflow-y: auto; }
  .stack-item { display: flex; align-items: flex-start; gap: 8px; padding: 10px 14px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
  .stack-item:last-child { border-bottom: none; }
  .stack-item:hover { background: var(--surface-2); }
  .stack-item-body { flex: 1; min-width: 0; }
  .stack-item-desc { font-size: 12px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .stack-item-meta { font-size: 11px; color: var(--text-3); margin-top: 2px; }
  .status-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .status-col { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .status-col-header { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 12px; font-weight: 600; color: var(--text-2); display: flex; align-items: center; gap: 6px; }
  .status-col-body { padding: 8px; display: flex; flex-direction: column; gap: 6px; max-height: 280px; overflow-y: auto; }
  .status-card { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 10px; cursor: pointer; }
  .status-card:hover { border-color: var(--border-2); }
  .status-card-title { font-size: 12px; font-weight: 500; color: var(--text); margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .status-card-meta { font-size: 11px; color: var(--text-3); }
  .module-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .module-chip { display: flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; transition: filter 0.1s; }
  .module-chip:hover { filter: brightness(1.2); }
  .empty-col { padding: 16px; text-align: center; color: var(--text-3); font-size: 12px; }
</style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="topbar">
      <div>
        <div class="topbar-title">University Calendar</div>
        <div class="topbar-sub" id="topbar-sub"></div>
      </div>
      <div class="topbar-actions">
        <button class="btn-ghost" onclick="openModal('modal-modules')">Modules</button>
      </div>
    </div>

    <div class="content">
      <div class="uni-layout">
        <div class="cal-panel">
          <div class="cal-nav-bar">
            <div class="cal-nav-title" id="cal-title"></div>
            <div class="cal-nav-btns">
              <button class="cal-nav-btn" onclick="navigate(-1)"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
              <button class="btn-ghost" style="font-size:12px;padding:3px 10px;" onclick="goToday()">Today</button>
              <button class="cal-nav-btn" onclick="navigate(1)"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>
            </div>
          </div>
          <div class="cal-grid" id="cal-grid">
            <div class="cal-dow">Mon</div><div class="cal-dow">Tue</div><div class="cal-dow">Wed</div>
            <div class="cal-dow">Thu</div><div class="cal-dow">Fri</div><div class="cal-dow">Sat</div><div class="cal-dow">Sun</div>
          </div>
        </div>

        <div class="right-panel">
          <div class="stack-panel">
            <div class="stack-header">
              <span class="stack-title">All tasks</span>
              <span id="stack-count" style="font-size:11px;color:var(--text-3);"></span>
            </div>
            <div class="stack-body" id="stack-body"></div>
          </div>
          <div class="status-cols">
            <div class="status-col">
              <div class="status-col-header">
                <span style="width:8px;height:8px;border-radius:50%;background:var(--warning);display:inline-block;flex-shrink:0;"></span>Active
              </div>
              <div class="status-col-body" id="col-active"></div>
            </div>
            <div class="status-col">
              <div class="status-col-header">
                <span style="width:8px;height:8px;border-radius:50%;background:var(--success);display:inline-block;flex-shrink:0;"></span>Completed
              </div>
              <div class="status-col-body" id="col-completed"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- TASK MODAL -->
<div class="modal-backdrop" id="modal-task" style="display:none;">
  <div class="modal">
    <div class="modal-title" id="modal-task-title">Add task</div>
    <input type="hidden" id="task-id" />
    <div class="form-field">
      <label class="form-label">Module</label>
      <select class="form-select" id="task-module">
        <option value="">No module</option>
      </select>
    </div>
    <div class="form-field">
      <label class="form-label">Description *</label>
      <textarea class="form-input" id="task-desc" rows="3" placeholder="What needs to be done..." style="resize:vertical;"></textarea>
    </div>
    <div class="form-field">
      <label class="form-label">Due date</label>
      <input class="form-input" type="date" id="task-due" />
    </div>
    <div class="form-field">
      <label class="form-label">Status</label>
      <select class="form-select" id="task-status">
        <option value="todo">To do</option>
        <option value="in_progress">In progress</option>
        <option value="completed">Completed</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn-danger" id="task-del-btn" style="display:none;margin-right:auto;" onclick="deleteTask()">Delete</button>
      <button class="btn-ghost" onclick="closeModal('modal-task')">Cancel</button>
      <button class="btn-primary" onclick="saveTask()">Save</button>
    </div>
  </div>
</div>

<!-- MODULES MODAL -->
<div class="modal-backdrop" id="modal-modules" style="display:none;">
  <div class="modal" style="width:480px;">
    <div class="modal-title">Modules</div>
    <div id="module-list-view"></div>
    <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border);">
      <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:12px;">Add module</div>
      <div class="form-field">
        <label class="form-label">Name *</label>
        <input class="form-input" id="new-module-name" placeholder="e.g. Actuarial Science" />
      </div>
      <div class="form-field">
        <label class="form-label">Colour</label>
        <div class="colour-picker" id="new-module-colour-picker"></div>
        <input type="hidden" id="new-module-colour" value="#58a6ff" />
      </div>
      <button class="btn-primary" onclick="addModule()">Add module</button>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal('modal-modules')">Close</button>
    </div>
  </div>
</div>

<!-- EDIT MODULE MODAL -->
<div class="modal-backdrop" id="modal-edit-module" style="display:none;">
  <div class="modal" style="width:400px;">
    <div class="modal-title">Edit module</div>
    <input type="hidden" id="edit-module-id" />
    <div class="form-field">
      <label class="form-label">Name *</label>
      <input class="form-input" id="edit-module-name" />
    </div>
    <div class="form-field">
      <label class="form-label">Colour</label>
      <div class="colour-picker" id="edit-module-colour-picker"></div>
      <input type="hidden" id="edit-module-colour" value="#58a6ff" />
    </div>
    <div class="modal-footer">
      <button class="btn-danger" style="margin-right:auto;" onclick="deleteModule()">Delete</button>
      <button class="btn-ghost" onclick="closeModal('modal-edit-module')">Cancel</button>
      <button class="btn-primary" onclick="saveModule()">Save</button>
    </div>
  </div>
</div>

<!-- BRANCH MODAL (sidebar) -->
<div class="modal-backdrop" id="modal-branch" style="display:none;">
  <div class="modal">
    <div class="modal-title">New branch</div>
    <div class="form-field">
      <label class="form-label">Branch name *</label>
      <input class="form-input" id="branch-name" placeholder="e.g. Aloware" />
    </div>
    <div class="form-field">
      <label class="form-label">Colour</label>
      <div class="colour-picker" id="colour-picker"></div>
      <input type="hidden" id="branch-colour" value="#58a6ff" />
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal('modal-branch')">Cancel</button>
      <button class="btn-primary" onclick="saveBranch()">Create</button>
    </div>
  </div>
</div>

<script src="/app.js"></script>
<script src="/sidebar.js"></script>
<script>
let me = null;
let branches = [];
let modules = [];
let tasks = [];
let currentDate = new Date();
let editingTaskId = null;

// STATUS ICONS
function statusIcon(status, colour) {
  if (status === 'completed') return `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="${colour}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
  if (status === 'in_progress') return `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="${colour}" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>`;
  return `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="${colour}" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/></svg>`;
}

async function init() {
  me = await requireLogin();
  if (!me) return;
  branches = await GET('branches').catch(() => []);
  buildSidebar('uni', me, branches);
  modules = await GET('uni', { type: 'modules' }).catch(() => []);
  await loadTasks();
  buildColourPickers();
  renderModuleList();
  renderGrid();
  renderPanels();
}

async function loadTasks() {
  tasks = await GET('uni', { type: 'tasks' }).catch(() => []);
}

// ── CALENDAR ──────────────────────────────────────────────────
function navigate(dir) {
  currentDate.setMonth(currentDate.getMonth() + dir);
  renderGrid();
}

function goToday() {
  currentDate = new Date();
  renderGrid();
}

function renderGrid() {
  const y = currentDate.getFullYear();
  const m = currentDate.getMonth();
  document.getElementById('cal-title').textContent =
    currentDate.toLocaleDateString('en-ZA', { month: 'long', year: 'numeric' });
  document.getElementById('topbar-sub').textContent =
    currentDate.toLocaleDateString('en-ZA', { month: 'long', year: 'numeric' });

  const todayStr = today();
  const firstDay = new Date(y, m, 1);
  const lastDay  = new Date(y, m + 1, 0);

  // Mon-based start
  let startDow = firstDay.getDay(); // 0=Sun
  startDow = startDow === 0 ? 6 : startDow - 1;

  const grid = document.getElementById('cal-grid');
  // Remove all day cells (keep DOW headers = first 7 children)
  while (grid.children.length > 7) grid.removeChild(grid.lastChild);

  // Tasks indexed by date string
  const tasksByDate = {};
  for (const t of tasks) {
    if (!tasksByDate[t.due_date]) tasksByDate[t.due_date] = [];
    tasksByDate[t.due_date].push(t);
  }

  // Prev month filler
  for (let i = 0; i < startDow; i++) {
    const d = new Date(y, m, 1 - startDow + i);
    grid.appendChild(dayCell(d, true, todayStr, tasksByDate));
  }

  // Current month
  for (let d = 1; d <= lastDay.getDate(); d++) {
    const dt = new Date(y, m, d);
    grid.appendChild(dayCell(dt, false, todayStr, tasksByDate));
  }

  // Next month filler
  const total = startDow + lastDay.getDate();
  const remainder = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let i = 1; i <= remainder; i++) {
    const d = new Date(y, m + 1, i);
    grid.appendChild(dayCell(d, true, todayStr, tasksByDate));
  }
}

function dayCell(dt, otherMonth, todayStr, tasksByDate) {
  const dateStr = dt.toISOString().slice(0, 10);
  const isToday = dateStr === todayStr;
  const div = document.createElement('div');
  div.className = 'cal-day' + (otherMonth ? ' other-month' : '') + (isToday ? ' today' : '');

  const num = document.createElement('div');
  num.className = 'day-num';
  num.textContent = dt.getDate();
  div.appendChild(num);

  const dayTasks = tasksByDate[dateStr] || [];
  for (const t of dayTasks) {
    const mod = t.uni_modules;
    const colour = mod?.colour || '#6e7681';
    const bg = colourBg(colour, 0.2);
    const pill = document.createElement('div');
    pill.className = 'task-pill';
    pill.style.cssText = `background:${bg};color:${colour};`;
    pill.innerHTML = `<span class="status-icon">${statusIcon(t.status, colour)}</span><span style="flex:1;min-width:0;">${escHtml(t.description)}</span>`;
    pill.onclick = (e) => { e.stopPropagation(); openEditTask(t.id); };
    div.appendChild(pill);
  }

  div.onclick = () => openNewTask(dateStr);
  return div;
}

// ── PANELS ────────────────────────────────────────────────────
function renderPanels() {
  const sorted = [...tasks].sort((a, b) => a.due_date.localeCompare(b.due_date));
  document.getElementById('stack-count').textContent = sorted.length + ' task' + (sorted.length !== 1 ? 's' : '');

  // Stack
  const stackBody = document.getElementById('stack-body');
  if (!sorted.length) {
    stackBody.innerHTML = '<div class="empty-col">No tasks yet</div>';
  } else {
    stackBody.innerHTML = sorted.map(t => {
      const mod = t.uni_modules;
      const colour = mod?.colour || '#6e7681';
      const bg = colourBg(colour, 0.15);
      const dateStr = new Date(t.due_date).toLocaleDateString('en-ZA', { day: 'numeric', month: 'short' });
      return `<div class="stack-item" onclick="openEditTask('${t.id}')">
        <div style="width:10px;height:10px;margin-top:3px;flex-shrink:0;">${statusIcon(t.status, colour)}</div>
        <div class="stack-item-body">
          <div class="stack-item-desc">${escHtml(t.description)}</div>
          <div class="stack-item-meta">${mod ? escHtml(mod.name) + ' · ' : ''}${dateStr}</div>
        </div>
      </div>`;
    }).join('');
  }

  // Active column (todo + in_progress)
  const active = sorted.filter(t => t.status !== 'completed');
  const colActive = document.getElementById('col-active');
  colActive.innerHTML = active.length ? active.map(t => statusCard(t)).join('') : '<div class="empty-col">None</div>';

  // Completed column
  const completed = sorted.filter(t => t.status === 'completed');
  const colCompleted = document.getElementById('col-completed');
  colCompleted.innerHTML = completed.length ? completed.map(t => statusCard(t)).join('') : '<div class="empty-col">None</div>';
}

function statusCard(t) {
  const mod = t.uni_modules;
  const colour = mod?.colour || '#6e7681';
  const dateStr = new Date(t.due_date).toLocaleDateString('en-ZA', { day: 'numeric', month: 'short' });
  const statusLabel = { todo: 'To do', in_progress: 'In progress', completed: 'Completed' }[t.status];
  return `<div class="status-card" onclick="openEditTask('${t.id}')">
    <div class="status-card-title" style="display:flex;align-items:center;gap:6px;">
      ${statusIcon(t.status, colour)}
      ${escHtml(t.description)}
    </div>
    <div class="status-card-meta">${mod ? escHtml(mod.name) + ' · ' : ''}${dateStr}</div>
  </div>`;
}

// ── TASK MODAL ────────────────────────────────────────────────
function populateModuleSelect() {
  const sel = document.getElementById('task-module');
  sel.innerHTML = '<option value="">No module</option>';
  modules.forEach(m => {
    const opt = document.createElement('option');
    opt.value = m.id; opt.textContent = m.name; sel.appendChild(opt);
  });
}

function openNewTask(dateStr) {
  editingTaskId = null;
  populateModuleSelect();
  document.getElementById('modal-task-title').textContent = 'Add task';
  document.getElementById('task-id').value = '';
  document.getElementById('task-module').value = '';
  document.getElementById('task-desc').value = '';
  document.getElementById('task-due').value = dateStr;
  document.getElementById('task-status').value = 'todo';
  document.getElementById('task-del-btn').style.display = 'none';
  openModal('modal-task');
}

function openEditTask(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  editingTaskId = id;
  populateModuleSelect();
  document.getElementById('modal-task-title').textContent = 'Edit task';
  document.getElementById('task-id').value = id;
  document.getElementById('task-module').value = t.module_id || '';
  document.getElementById('task-desc').value = t.description;
  document.getElementById('task-due').value = t.due_date;
  document.getElementById('task-status').value = t.status;
  document.getElementById('task-del-btn').style.display = 'inline-flex';
  openModal('modal-task');
}

async function saveTask() {
  const desc    = document.getElementById('task-desc').value.trim();
  const due     = document.getElementById('task-due').value;
  const modId   = document.getElementById('task-module').value;
  const status  = document.getElementById('task-status').value;
  if (!desc) { toast('Description required', 'error'); return; }
  if (!due)  { toast('Due date required', 'error'); return; }
  try {
    if (editingTaskId) {
      const updated = await PATCH('uni?type=tasks', { id: editingTaskId, description: desc, due_date: due, module_id: modId || null, status });
      tasks = tasks.map(t => t.id === editingTaskId ? updated : t);
    } else {
      const created = await POST('uni?type=tasks', { description: desc, due_date: due, module_id: modId || null, status });
      tasks.push(created);
    }
    closeModal('modal-task');
    renderGrid();
    renderPanels();
    toast(editingTaskId ? 'Task updated' : 'Task added', 'success');
  } catch(e) { toast(e.message, 'error'); }
}

async function deleteTask() {
  if (!editingTaskId || !confirm('Delete this task?')) return;
  try {
    await DELETE('uni?type=tasks', { id: editingTaskId });
    tasks = tasks.filter(t => t.id !== editingTaskId);
    closeModal('modal-task');
    renderGrid();
    renderPanels();
    toast('Task deleted', 'success');
  } catch(e) { toast(e.message, 'error'); }
}

// ── MODULES ───────────────────────────────────────────────────
function buildColourPickers() {
  buildPicker('new-module-colour-picker', 'new-module-colour', '#58a6ff');
}

function buildPicker(pickerId, inputId, selected) {
  const picker = document.getElementById(pickerId);
  if (!picker) return;
  picker.innerHTML = '';
  PALETTE.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'colour-swatch' + (c === selected ? ' active' : '');
    sw.style.background = c;
    sw.onclick = () => {
      picker.querySelectorAll('.colour-swatch').forEach(s => s.classList.remove('active'));
      sw.classList.add('active');
      document.getElementById(inputId).value = c;
    };
    picker.appendChild(sw);
  });
}

function renderModuleList() {
  const container = document.getElementById('module-list-view');
  if (!modules.length) {
    container.innerHTML = '<div style="color:var(--text-3);font-size:13px;padding:8px 0;">No modules yet.</div>';
    return;
  }
  container.innerHTML = '<div class="module-list">' + modules.map(m => {
    const bg = colourBg(m.colour, 0.2);
    return `<div class="module-chip" style="background:${bg};color:${m.colour};border:1px solid ${m.colour};" onclick="openEditModule('${m.id}')">
      <span style="width:8px;height:8px;border-radius:50%;background:${m.colour};display:inline-block;flex-shrink:0;"></span>
      ${escHtml(m.name)}
    </div>`;
  }).join('') + '</div>';
}

async function addModule() {
  const name   = document.getElementById('new-module-name').value.trim();
  const colour = document.getElementById('new-module-colour').value;
  if (!name) { toast('Name required', 'error'); return; }
  try {
    const m = await POST('uni?type=modules', { name, colour });
    modules.push(m);
    modules.sort((a, b) => a.name.localeCompare(b.name));
    document.getElementById('new-module-name').value = '';
    renderModuleList();
    toast('Module added', 'success');
  } catch(e) { toast(e.message, 'error'); }
}

function openEditModule(id) {
  const m = modules.find(m => m.id === id);
  if (!m) return;
  document.getElementById('edit-module-id').value = id;
  document.getElementById('edit-module-name').value = m.name;
  document.getElementById('edit-module-colour').value = m.colour;
  buildPicker('edit-module-colour-picker', 'edit-module-colour', m.colour);
  openModal('modal-edit-module');
}

async function saveModule() {
  const id     = document.getElementById('edit-module-id').value;
  const name   = document.getElementById('edit-module-name').value.trim();
  const colour = document.getElementById('edit-module-colour').value;
  if (!name) { toast('Name required', 'error'); return; }
  try {
    const updated = await PATCH('uni?type=modules', { id, name, colour });
    modules = modules.map(m => m.id === id ? updated : m);
    closeModal('modal-edit-module');
    renderModuleList();
    renderGrid();
    renderPanels();
    toast('Module updated', 'success');
  } catch(e) { toast(e.message, 'error'); }
}

async function deleteModule() {
  const id = document.getElementById('edit-module-id').value;
  if (!confirm('Delete this module? Tasks will become unassigned.')) return;
  try {
    await DELETE('uni?type=modules', { id });
    modules = modules.filter(m => m.id !== id);
    tasks = tasks.map(t => t.module_id === id ? { ...t, module_id: null, uni_modules: null } : t);
    closeModal('modal-edit-module');
    renderModuleList();
    renderGrid();
    renderPanels();
    toast('Module deleted', 'success');
  } catch(e) { toast(e.message, 'error'); }
}

async function saveBranch() {
  const name   = document.getElementById('branch-name').value.trim();
  const colour = document.getElementById('branch-colour').value;
  if (!name) { toast('Branch name required', 'error'); return; }
  try {
    const b = await POST('branches', { name, colour });
    branches.push(b);
    buildSidebar('uni', me, branches);
    closeModal('modal-branch');
    toast('Branch created', 'success');
  } catch(e) { toast(e.message, 'error'); }
}

function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

init();
</script>
</body>
</html>
