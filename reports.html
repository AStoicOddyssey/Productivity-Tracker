<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reports — Productivity Tracker</title>
<link rel="stylesheet" href="/app.css" />
<style>
  .report-form { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 20px; }
  .report-form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr auto; gap: 16px; align-items: end; }
  .report-totals { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px 20px; margin-top: 16px; display: flex; gap: 32px; align-items: center; flex-wrap: wrap; }
  .total-item .total-label { font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .total-item .total-value { font-size: 22px; font-weight: 600; color: var(--text); letter-spacing: -0.02em; }
  .rate-row { margin-left: auto; display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text-2); }
  .rate-input { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 5px 10px; font-size: 13px; color: var(--text); font-family: var(--font); outline: none; width: 110px; }
  .rate-input:focus { border-color: var(--accent); }
  .summary-table { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-top: 16px; }
  .branch-group-row { background: var(--surface-2); }
  .branch-group-row td { font-weight: 600; }
  .task-row td:first-child { padding-left: 28px; color: var(--text-2); }
  .week-row { background: var(--surface-3); }
  .week-row td { font-size: 12px; color: var(--text-3); font-style: italic; }
  .export-actions { display: flex; gap: 8px; }
  .branch-checkboxes { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
  .branch-check-label { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-2); cursor: pointer; }
  .branch-dot-sm { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .empty-report { text-align: center; padding: 40px; color: var(--text-3); font-size: 13px; }
</style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="topbar">
      <div>
        <div class="topbar-title">Reports</div>
        <div class="topbar-sub">Export &amp; billing summary</div>
      </div>
      <div class="topbar-actions export-actions">
        <button class="btn-ghost" onclick="exportCSV()">
          <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          CSV
        </button>
        <button class="btn-primary" onclick="exportPDF()">
          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          PDF
        </button>
      </div>
    </div>

    <div class="content">
      <div class="report-form">
        <div class="report-form-grid">
          <div class="form-field" style="margin:0;">
            <label class="form-label">From</label>
            <input class="form-input" type="date" id="from-date" />
          </div>
          <div class="form-field" style="margin:0;">
            <label class="form-label">To</label>
            <input class="form-input" type="date" id="to-date" />
          </div>
          <div class="form-field" style="margin:0;">
            <label class="form-label">Rates</label>
            <div style="font-size:12px;color:var(--text-3);padding:7px 0;">Set per branch — see sidebar</div>
          </div>
          <div class="form-field" style="margin:0;">
            <label class="form-label">&nbsp;</label>
            <button class="btn-primary" style="width:100%;" onclick="generateReport()">Generate</button>
          </div>
        </div>
        <div style="margin-top:16px;">
          <label class="form-label">Include branches</label>
          <div class="branch-checkboxes" id="branch-checkboxes">
            <span style="color:var(--text-3);font-size:13px;">Loading…</span>
          </div>
        </div>
      </div>

      <div class="report-form" id="bank-details-panel">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
          <span class="panel-title" style="font-size:13px;font-weight:600;color:var(--text);">Bank details (for PDF export)</span>
          <button class="btn-ghost" style="font-size:12px;padding:4px 10px;" onclick="saveBankDetails()">Save</button>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;">
          <div class="form-field" style="margin:0;">
            <label class="form-label">Bank</label>
            <input class="form-input" id="bank-name" placeholder="e.g. FNB" />
          </div>
          <div class="form-field" style="margin:0;">
            <label class="form-label">Branch code</label>
            <input class="form-input" id="bank-branch-code" placeholder="e.g. 250655" />
          </div>
          <div class="form-field" style="margin:0;">
            <label class="form-label">Account number</label>
            <input class="form-input" id="bank-account-number" placeholder="Account number" />
          </div>
          <div class="form-field" style="margin:0;">
            <label class="form-label">Account type</label>
            <input class="form-input" id="bank-account-type" placeholder="e.g. Cheque / Savings" />
          </div>
          <div class="form-field" style="margin:0;">
            <label class="form-label">Account holder</label>
            <input class="form-input" id="bank-account-holder" placeholder="Account holder name" />
          </div>
        </div>
      </div>

      <div id="report-output" style="display:none;">
        <div class="report-totals">
          <div class="total-item">
            <div class="total-label">Total hours</div>
            <div class="total-value" id="tot-hours">—</div>
          </div>
          <div class="total-item">
            <div class="total-label">Billable hours</div>
            <div class="total-value text-accent" id="tot-billable">—</div>
          </div>
          <div class="total-item">
            <div class="total-label">Total earned</div>
            <div class="total-value text-success" id="tot-earned">—</div>
          </div>
        </div>

        <div class="summary-table">
          <table class="data-table" id="report-table">
            <thead>
              <tr>
                <th>Branch / Task</th>
                <th>Status</th>
                <th>Billable</th>
                <th style="text-align:right;">Hours</th>
              </tr>
            </thead>
            <tbody id="report-tbody"></tbody>
          </table>
        </div>
      </div>

      <div id="report-empty" class="empty-report">
        Select a date range and click Generate to see your report.
      </div>
    </div>
  </main>
</div>

<!-- BRANCH MODAL -->
<div class="modal-backdrop" id="modal-branch" style="display:none;">
  <div class="modal">
    <div class="modal-title">New branch</div>
    <div class="form-field">
      <label class="form-label">Branch name *</label>
      <input class="form-input" id="branch-name" placeholder="e.g. Aloware" />
    </div>
    <div class="form-field">
      <label class="form-label">Colour</label>
      <div class="colour-picker" id="colour-picker"></div>
      <input type="hidden" id="branch-colour" value="#58a6ff" />
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal('modal-branch')">Cancel</button>
      <button class="btn-primary" onclick="saveBranch()">Create</button>
    </div>
  </div>
</div>

<script src="/app.js"></script>
<script src="/sidebar.js"></script>
<script>
let branches = [];
let me = null;
let reportData = null;

async function init() {
  me = await requireLogin();
  if (!me) return;
  branches = await GET('branches').catch(() => []);
  buildSidebar('reports', me, branches);
  buildBranchCheckboxes();
  buildColourPicker();

  // Default: current month
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth();
  document.getElementById('from-date').value = new Date(y, m, 1).toISOString().slice(0,10);
  document.getElementById('to-date').value   = new Date(y, m+1, 0).toISOString().slice(0,10);

  const bank = await GET('settings?type=bank-details').catch(() => ({}));
  document.getElementById('bank-name').value            = bank.bank_name || '';
  document.getElementById('bank-branch-code').value     = bank.branch_code || '';
  document.getElementById('bank-account-number').value  = bank.account_number || '';
  document.getElementById('bank-account-type').value    = bank.account_type || '';
  document.getElementById('bank-account-holder').value  = bank.account_holder || '';
}

async function saveBankDetails() {
  const body = {
    bank_name:      document.getElementById('bank-name').value.trim(),
    branch_code:    document.getElementById('bank-branch-code').value.trim(),
    account_number: document.getElementById('bank-account-number').value.trim(),
    account_type:   document.getElementById('bank-account-type').value.trim(),
    account_holder: document.getElementById('bank-account-holder').value.trim()
  };
  try {
    await POST('settings?type=bank-details', body);
    toast('Bank details saved', 'success');
  } catch(e) { toast(e.message, 'error'); }
}

function buildBranchCheckboxes() {
  const container = document.getElementById('branch-checkboxes');
  if (!branches.length) { container.innerHTML = '<span style="color:var(--text-3);font-size:13px;">No branches yet.</span>'; return; }
  container.innerHTML = branches.map(b => `
    <label class="branch-check-label">
      <input type="checkbox" value="${b.id}" checked />
      <span class="branch-dot-sm" style="background:${b.colour};"></span>
      ${escHtml(b.name)}
    </label>
  `).join('');
}

function buildColourPicker() {
  const picker = document.getElementById('colour-picker');
  if (!picker) return;
  picker.innerHTML = '';
  PALETTE.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'colour-swatch' + (c === '#58a6ff' ? ' active' : '');
    sw.style.background = c;
    sw.onclick = () => {
      document.querySelectorAll('.colour-swatch').forEach(s => s.classList.remove('active'));
      sw.classList.add('active');
      document.getElementById('branch-colour').value = c;
    };
    picker.appendChild(sw);
  });
}

function getSelectedBranches() {
  return [...document.querySelectorAll('#branch-checkboxes input:checked')].map(i => i.value);
}

async function generateReport() {
  const from = document.getElementById('from-date').value;
  const to   = document.getElementById('to-date').value;
  const selectedBranches = getSelectedBranches();

  if (!from || !to) { toast('Select a date range', 'error'); return; }

  const logs  = await GET('time-logs', { from, to }).catch(() => []);
  const tasks = await GET('tasks').catch(() => []);

  // Filter by selected branches
  const filtered = logs.filter(l => {
    const branchId = l.tasks?.branch_id;
    if (!branchId && selectedBranches.length === 0) return true;
    return selectedBranches.includes(branchId) || (!branchId && selectedBranches.length === branches.length);
  });

  // Aggregate by branch → task, each with its own effective rate
  const branchMap = {};
  let totalEarned = 0;
  for (const log of filtered) {
    const t = log.tasks;
    if (!t) continue;
    const bid = t.branch_id || '__none__';
    const bn  = t.branches?.name || 'Unassigned';
    const bc  = t.branches?.colour || '#6e7681';
    const branchRate = t.branches?.hourly_rate ?? 133.33;
    const taskRate   = t.hourly_rate != null ? t.hourly_rate : branchRate;

    if (!branchMap[bid]) branchMap[bid] = { name: bn, colour: bc, rate: branchRate, tasks: {} };
    if (!branchMap[bid].tasks[log.task_id]) {
      const full = tasks.find(tt => tt.id === log.task_id);
      branchMap[bid].tasks[log.task_id] = { title: t.title, billable: t.billable, status: full?.status || '—', slots: 0, rate: taskRate };
    }
    branchMap[bid].tasks[log.task_id].slots++;
    if (t.billable) totalEarned += 0.5 * taskRate;
  }

  // Weekly breakdown
  const weekLogs = buildWeekBreakdown(filtered, from, to);

  reportData = { branchMap, weekLogs, totalEarned, from, to, logs: filtered };
  renderReport(branchMap, weekLogs, totalEarned);
}

function buildWeekBreakdown(logs, from, to) {
  const weeks = [];
  let weekStart = new Date(from);
  // Align to Monday
  const day = weekStart.getDay();
  if (day !== 1) weekStart.setDate(weekStart.getDate() - (day === 0 ? 6 : day - 1));
  // But don't go before `from`
  if (weekStart < new Date(from)) weekStart = new Date(from);

  const end = new Date(to);
  while (weekStart <= end) {
    const weekEnd = new Date(weekStart);
    weekEnd.setDate(weekStart.getDate() + 6);
    if (weekEnd > end) weekEnd.setTime(end.getTime());

    const wFrom = weekStart.toISOString().slice(0,10);
    const wTo   = weekEnd.toISOString().slice(0,10);
    const wLogs = logs.filter(l => l.log_date >= wFrom && l.log_date <= wTo);
    const slots = wLogs.length;
    const billable = wLogs.filter(l => l.tasks?.billable).length;

    weeks.push({ from: wFrom, to: wTo, hours: slots * 0.5, billable_hours: billable * 0.5 });
    weekStart = new Date(weekEnd);
    weekStart.setDate(weekStart.getDate() + 1);
  }
  return weeks;
}

function renderReport(branchMap, weekLogs, totalEarned) {
  const tbody = document.getElementById('report-tbody');
  let totalSlots = 0, billableSlots = 0;
  let rows = '';

  for (const [bid, branch] of Object.entries(branchMap)) {
    let bSlots = 0, bBillable = 0;
    let taskRows = '';
    for (const [tid, task] of Object.entries(branch.tasks)) {
      bSlots += task.slots;
      if (task.billable) bBillable += task.slots;
      const statusBadge = { todo: 'badge-todo', in_progress: 'badge-inprogress', completed: 'badge-completed' }[task.status] || '';
      const statusLabel = { todo: 'To do', in_progress: 'In progress', completed: 'Completed' }[task.status] || task.status;
      taskRows += `<tr class="task-row">
        <td>${escHtml(task.title)} <span style="color:var(--text-3);font-size:11px;">(R${task.rate}/hr)</span></td>
        <td><span class="badge ${statusBadge}">${statusLabel}</span></td>
        <td><span class="badge ${task.billable ? 'badge-billable' : 'badge-nonbillable'}">${task.billable ? 'Yes' : 'No'}</span></td>
        <td style="text-align:right;">${task.slots * 0.5}h</td>
      </tr>`;
    }
    totalSlots += bSlots; billableSlots += bBillable;
    rows += `<tr class="branch-group-row">
      <td style="display:flex;align-items:center;gap:8px;">
        <span style="width:8px;height:8px;border-radius:50%;background:${branch.colour};display:inline-block;flex-shrink:0;"></span>
        ${escHtml(branch.name)} <span style="color:var(--text-3);font-weight:400;font-size:11px;">(R${branch.rate}/hr)</span>
      </td>
      <td></td><td></td>
      <td style="text-align:right;color:var(--accent);">${bSlots * 0.5}h</td>
    </tr>${taskRows}`;
  }

  // Weekly subtotals
  rows += `<tr><td colspan="4" style="padding:8px 14px;font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;background:var(--surface-2);">Weekly breakdown</td></tr>`;
  weekLogs.forEach((w, i) => {
    const fromD = new Date(w.from).toLocaleDateString('en-ZA', { weekday:'short', day:'numeric', month:'short' });
    const toD   = new Date(w.to).toLocaleDateString('en-ZA', { weekday:'short', day:'numeric', month:'short' });
    rows += `<tr class="week-row">
      <td colspan="3">Week ${i+1} (${fromD} – ${toD})</td>
      <td style="text-align:right;">${w.hours}h</td>
    </tr>`;
  });

  tbody.innerHTML = rows || '<tr><td colspan="4" style="text-align:center;padding:24px;color:var(--text-3);">No time logged for this period</td></tr>';

  const totalHours    = totalSlots * 0.5;
  const billableHours = billableSlots * 0.5;
  const earned        = totalEarned.toFixed(2);

  document.getElementById('tot-hours').textContent    = totalHours + 'h';
  document.getElementById('tot-billable').textContent  = billableHours + 'h';
  document.getElementById('tot-earned').textContent    = 'R' + parseFloat(earned).toLocaleString('en-ZA', { minimumFractionDigits: 2 });

  document.getElementById('report-output').style.display = 'block';
  document.getElementById('report-empty').style.display  = 'none';
}

// ── CSV EXPORT ────────────────────────────────────────────────
function exportCSV() {
  if (!reportData) { toast('Generate a report first', 'error'); return; }
  const rows = [['Date', 'Slot Start', 'Slot End', 'Task', 'Branch', 'Billable', 'Hours']];
  for (const log of reportData.logs) {
    rows.push([
      log.log_date, log.slot_start, log.slot_end,
      log.tasks?.title || '',
      log.tasks?.branches?.name || '',
      log.tasks?.billable ? 'Yes' : 'No',
      0.5
    ]);
  }
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `timesheet-${reportData.from}-${reportData.to}.csv`;
  a.click(); URL.revokeObjectURL(url);
}

// ── PDF EXPORT ────────────────────────────────────────────────
async function exportPDF() {
  if (!reportData) { toast('Generate a report first', 'error'); return; }
  const { branchMap, weekLogs, totalEarned, from, to } = reportData;

  let totalSlots = 0, billableSlots = 0;
  for (const b of Object.values(branchMap))
    for (const t of Object.values(b.tasks)) { totalSlots += t.slots; if (t.billable) billableSlots += t.slots; }

  const totalHours    = totalSlots * 0.5;
  const billableHours = billableSlots * 0.5;
  const earned        = totalEarned.toFixed(2);

  const fromFmt = new Date(from).toLocaleDateString('en-ZA', { day:'numeric', month:'long', year:'numeric' });
  const toFmt   = new Date(to).toLocaleDateString('en-ZA', { day:'numeric', month:'long', year:'numeric' });

  const bank = await GET('settings?type=bank-details').catch(() => ({}));
  const hasBankDetails = bank.bank_name || bank.account_number;

  let branchSection = '';
  for (const [, branch] of Object.entries(branchMap)) {
    let bSlots = 0;
    let taskRows = '';
    for (const [, task] of Object.entries(branch.tasks)) {
      bSlots += task.slots;
      const status = { todo: 'To do', in_progress: 'In progress', completed: 'Completed' }[task.status] || task.status;
      taskRows += `<tr>
        <td style="padding:6px 12px 6px 24px;color:#555;">${task.title} <span style="color:#999;font-size:10px;">(R${task.rate}/hr)</span></td>
        <td style="padding:6px 12px;color:#555;">${status}</td>
        <td style="padding:6px 12px;color:#555;">${task.billable ? 'Yes' : 'No'}</td>
        <td style="padding:6px 12px;text-align:right;color:#555;">${task.slots * 0.5}h</td>
      </tr>`;
    }
    branchSection += `
      <tr style="background:#f3f4f6;">
        <td colspan="3" style="padding:8px 12px;font-weight:600;color:#111;">${branch.name} <span style="color:#666;font-weight:400;font-size:11px;">(R${branch.rate}/hr)</span></td>
        <td style="padding:8px 12px;text-align:right;font-weight:600;color:#111;">${bSlots * 0.5}h</td>
      </tr>${taskRows}`;
  }

  let weekSection = weekLogs.map((w, i) => {
    const fromD = new Date(w.from).toLocaleDateString('en-ZA', { weekday:'short', day:'numeric', month:'short' });
    const toD   = new Date(w.to).toLocaleDateString('en-ZA', { weekday:'short', day:'numeric', month:'short' });
    return `<tr>
      <td colspan="3" style="padding:6px 12px;color:#555;font-style:italic;">Week ${i+1}: ${fromD} – ${toD}</td>
      <td style="padding:6px 12px;text-align:right;color:#555;">${w.hours}h</td>
    </tr>`;
  }).join('');

  const bankSection = hasBankDetails ? `
  <table style="margin-top:0;">
    <thead><tr><th colspan="2">Bank details</th></tr></thead>
    <tbody>
      <tr><td style="padding:6px 12px;color:#555;width:160px;">Bank</td><td style="padding:6px 12px;color:#111;">${bank.bank_name || '—'}</td></tr>
      <tr><td style="padding:6px 12px;color:#555;">Branch code</td><td style="padding:6px 12px;color:#111;">${bank.branch_code || '—'}</td></tr>
      <tr><td style="padding:6px 12px;color:#555;">Account number</td><td style="padding:6px 12px;color:#111;">${bank.account_number || '—'}</td></tr>
      <tr><td style="padding:6px 12px;color:#555;">Account type</td><td style="padding:6px 12px;color:#111;">${bank.account_type || '—'}</td></tr>
      <tr><td style="padding:6px 12px;color:#555;">Account holder</td><td style="padding:6px 12px;color:#111;">${bank.account_holder || '—'}</td></tr>
    </tbody>
  </table>` : '';

  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
  <title>Timesheet ${fromFmt} – ${toFmt}</title>
  <style>
    body { font-family: Arial, sans-serif; font-size: 13px; color: #111; padding: 40px; }
    h1 { font-size: 20px; margin-bottom: 4px; }
    .sub { color: #666; font-size: 13px; margin-bottom: 24px; }
    table { width: 100%; border-collapse: collapse; margin-bottom: 24px; }
    th { background: #111; color: #fff; padding: 8px 12px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .05em; }
    th:last-child { text-align: right; }
    tr { border-bottom: 1px solid #e5e7eb; }
    .totals { display: flex; gap: 40px; background: #f9fafb; border: 1px solid #e5e7eb; padding: 16px 20px; border-radius: 6px; }
    .tot-label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing:.05em; margin-bottom:4px; }
    .tot-val { font-size: 20px; font-weight: 700; }
    @media print { body { padding: 0; } }
  </style></head><body>
  <h1>Timesheet Report</h1>
  <div class="sub">${fromFmt} – ${toFmt}</div>

  <table>
    <thead><tr><th>Branch / Task</th><th>Status</th><th>Billable</th><th style="text-align:right;">Hours</th></tr></thead>
    <tbody>${branchSection}</tbody>
  </table>

  <table>
    <thead><tr><th colspan="3">Weekly breakdown</th><th style="text-align:right;">Hours</th></tr></thead>
    <tbody>${weekSection}</tbody>
  </table>

  <div class="totals" style="margin-bottom:24px;">
    <div><div class="tot-label">Total hours</div><div class="tot-val">${totalHours}h</div></div>
    <div><div class="tot-label">Billable hours</div><div class="tot-val">${billableHours}h</div></div>
    <div><div class="tot-label">Total earned</div><div class="tot-val">R${parseFloat(earned).toLocaleString('en-ZA',{minimumFractionDigits:2})}</div></div>
  </div>

  ${bankSection}

  <script>window.onload=()=>window.print();<\/script>
  </body></html>`;

  const blob = new Blob([html], { type: 'text/html' });
  const url  = URL.createObjectURL(blob);
  window.open(url, '_blank');
}

async function saveBranch() {
  const name   = document.getElementById('branch-name').value.trim();
  const colour = document.getElementById('branch-colour').value;
  if (!name) { toast('Branch name required', 'error'); return; }
  try {
    const b = await POST('branches', { name, colour });
    branches.push(b);
    buildBranchCheckboxes();
    buildSidebar('reports', me, branches);
    closeModal('modal-branch');
    toast('Branch created', 'success');
  } catch(e) { toast(e.message, 'error'); }
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

init();
</script>
