<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard — Productivity Tracker</title>
<link rel="stylesheet" href="/app.css" />
<style>
  .stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 24px; }
  .two-col    { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .branch-list { display: flex; flex-direction: column; gap: 10px; }
  .branch-row  { display: flex; align-items: center; gap: 10px; }
  .branch-dot  { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .branch-name { flex: 1; font-size: 13px; color: var(--text); }
  .branch-hrs  { font-size: 13px; font-weight: 500; color: var(--text-2); min-width: 36px; text-align: right; }
  .branch-bar-wrap { width: 80px; height: 4px; background: var(--surface-3); border-radius: 2px; overflow: hidden; }
  .branch-bar  { height: 100%; border-radius: 2px; }
  .chart-wrap  { position: relative; height: 180px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
  .donut-label { position: absolute; text-align: center; }
  .donut-label-val  { font-size: 22px; font-weight: 600; color: var(--text); }
  .donut-label-sub  { font-size: 11px; color: var(--text-3); }
  .week-range { display: flex; align-items: center; gap: 8px; }
  .week-range input { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); padding: 5px 10px; font-size: 12px; font-family: var(--font); outline: none; }
  .week-range input:focus { border-color: var(--accent); }
  .empty-state { text-align: center; padding: 40px; color: var(--text-3); font-size: 13px; }
</style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="topbar">
      <div>
        <div class="topbar-title">Dashboard</div>
        <div class="topbar-sub" id="topbar-date"></div>
      </div>
      <div class="topbar-actions">
        <div class="week-range">
          <input type="date" id="from-date" />
          <span style="color:var(--text-3);font-size:12px;">to</span>
          <input type="date" id="to-date" />
          <button class="btn-ghost" onclick="loadSummary()">Apply</button>
        </div>
      </div>
    </div>

    <div class="content">
      <!-- STAT CARDS -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Total hours</div>
          <div class="stat-value" id="stat-total">—</div>
          <div class="stat-sub" id="stat-period">Select a range</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Billable hours</div>
          <div class="stat-value text-accent" id="stat-billable">—</div>
          <div class="stat-sub" id="stat-billable-pct"></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total earned</div>
          <div class="stat-value text-success" id="stat-earned">—</div>
          <div class="stat-sub" id="stat-rate"></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Tasks</div>
          <div class="stat-value" id="stat-tasks">—</div>
          <div class="stat-sub" id="stat-tasks-sub"></div>
        </div>
      </div>

      <!-- CHARTS + TABLE -->
      <div class="two-col">
        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">Branch breakdown</span>
          </div>
          <div class="panel-body">
            <div class="chart-wrap">
              <canvas id="donut-chart" width="160" height="160"></canvas>
              <div class="donut-label">
                <div class="donut-label-val" id="donut-total">0h</div>
                <div class="donut-label-sub">total</div>
              </div>
            </div>
            <div class="branch-list" id="branch-list">
              <div class="empty-state">No data for this period</div>
            </div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">Hours by task</span>
          </div>
          <div class="panel-body" style="padding:0;">
            <table class="data-table" id="task-table">
              <thead>
                <tr>
                  <th>Task</th>
                  <th>Branch</th>
                  <th>Hrs</th>
                </tr>
              </thead>
              <tbody id="task-tbody">
                <tr><td colspan="3" class="empty-state">No data</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="/app.js"></script>
<script src="/sidebar.js"></script>
<script>
let summaryData = null;

async function init() {
  const me = await requireLogin();
  if (!me) return;

  document.getElementById('topbar-date').textContent = formatDate(today());

  const branches = await GET('branches').catch(() => []);
  buildSidebar('dashboard', me, branches);

  // Default: current week Mon-Sun
  const now = new Date();
  const day = now.getDay();
  const mon = new Date(now); mon.setDate(now.getDate() - (day === 0 ? 6 : day - 1));
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);

  document.getElementById('from-date').value = mon.toISOString().slice(0,10);
  document.getElementById('to-date').value   = sun.toISOString().slice(0,10);

  await loadSummary();
  checkReminder(me);
}

async function loadSummary() {
  const from = document.getElementById('from-date').value;
  const to   = document.getElementById('to-date').value;
  if (!from || !to) return;

  try {
    summaryData = await GET('summary', { from, to });
    renderSummary(summaryData, from, to);
  } catch(e) {
    toast('Failed to load summary', 'error');
  }
}

function renderSummary(data, from, to) {
  // Stat cards
  document.getElementById('stat-total').textContent    = data.total_hours + 'h';
  document.getElementById('stat-billable').textContent = data.billable_hours + 'h';
  document.getElementById('stat-earned').textContent   = 'R' + data.total_earned.toLocaleString('en-ZA', {minimumFractionDigits:2, maximumFractionDigits:2});
  document.getElementById('stat-rate').textContent     = 'Branch rates apply';
  document.getElementById('stat-period').textContent   = formatShortDate(from) + ' – ' + formatShortDate(to);

  const pct = data.total_hours > 0 ? Math.round(data.billable_hours / data.total_hours * 100) : 0;
  document.getElementById('stat-billable-pct').textContent = pct + '% of total';

  const tc = data.task_counts;
  document.getElementById('stat-tasks').textContent    = (tc.todo||0) + (tc.in_progress||0) + (tc.completed||0);
  document.getElementById('stat-tasks-sub').textContent = `${tc.in_progress||0} in progress · ${tc.completed||0} done`;

  // Donut chart
  drawDonut(data.branches);

  // Branch list
  const maxHrs = Math.max(...data.branches.map(b => b.hours), 1);
  const bl = document.getElementById('branch-list');
  if (!data.branches.length) {
    bl.innerHTML = '<div class="empty-state">No data for this period</div>';
  } else {
    bl.innerHTML = data.branches.map(b => `
      <div class="branch-row">
        <span class="branch-dot" style="background:${b.branch_colour};"></span>
        <span class="branch-name">${escHtml(b.branch_name)}</span>
        <div class="branch-bar-wrap"><div class="branch-bar" style="width:${Math.round(b.hours/maxHrs*100)}%;background:${b.branch_colour};"></div></div>
        <span class="branch-hrs">${b.hours}h</span>
      </div>
    `).join('');
  }

  // Task table — aggregate per task from branches
  loadTaskBreakdown(from, document.getElementById('to-date').value);
}

async function loadTaskBreakdown(from, to) {
  const logs = await GET('time-logs', { from, to }).catch(() => []);
  const taskMap = {};
  for (const log of logs) {
    const t = log.tasks;
    if (!t) continue;
    if (!taskMap[log.task_id]) taskMap[log.task_id] = { title: t.title, branch: t.branches?.name || '—', colour: t.branches?.colour || '#6e7681', slots: 0 };
    taskMap[log.task_id].slots++;
  }
  const tasks = Object.values(taskMap).sort((a,b) => b.slots - a.slots);
  const tbody = document.getElementById('task-tbody');
  if (!tasks.length) {
    tbody.innerHTML = '<tr><td colspan="3" style="padding:16px;color:var(--text-3);text-align:center;">No time logged</td></tr>';
  } else {
    tbody.innerHTML = tasks.map(t => `
      <tr>
        <td>${escHtml(t.title)}</td>
        <td style="color:${t.colour};">${escHtml(t.branch)}</td>
        <td class="text-accent">${t.slots * 0.5}h</td>
      </tr>
    `).join('');
  }
}

function drawDonut(branches) {
  const canvas = document.getElementById('donut-chart');
  const ctx = canvas.getContext('2d');
  const cx = 80, cy = 80, r = 70, thick = 18;
  ctx.clearRect(0, 0, 160, 160);

  const total = branches.reduce((s,b) => s + b.hours, 0);
  document.getElementById('donut-total').textContent = total + 'h';

  if (!total) {
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI*2);
    ctx.strokeStyle = '#21262d';
    ctx.lineWidth = thick;
    ctx.stroke();
    return;
  }

  let start = -Math.PI / 2;
  for (const b of branches) {
    const slice = (b.hours / total) * Math.PI * 2;
    ctx.beginPath();
    ctx.arc(cx, cy, r, start, start + slice);
    ctx.strokeStyle = b.branch_colour;
    ctx.lineWidth = thick;
    ctx.stroke();
    start += slice;
  }
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

init();
</script>
</body>
</html>
